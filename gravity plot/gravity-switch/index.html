<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Switch - Antigravity</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ui-container">
        <div class="top-bar">
            <a href="../../index.html" class="btn-back">← Back to Hub</a>
            <div class="score-display">Distance: <span id="scoreVal">0</span></div>
        </div>

        <div id="startScreen" class="overlay-screen">
            <h1>Gravity Switch</h1>
            <p>Press SPACE or CLICK to invert gravity. <br>Dodge the neon pillars. Don't get crushed!</p>
            <button id="startBtn" class="btn btn-primary pulse">Enter the Labyrinth</button>
        </div>

        <div id="gameOverScreen" class="overlay-screen hidden">
            <h1>Critical Failure</h1>
            <p>Distance Traveled: <span id="finalScoreVal">0</span></p>
            <button id="restartBtn" class="btn btn-primary">Try Again</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    
    <script src="script.js"></script>
</body>
</html>
