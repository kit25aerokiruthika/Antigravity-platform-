<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asteroid Dodge - Antigravity</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ui-container">
        <div class="top-bar">
            <a href="../../index.html" class="btn-back">← Back to Hub</a>
            <div class="score-display">Score: <span id="scoreVal">0</span></div>
        </div>

        <div id="startScreen" class="overlay-screen">
            <h1>Asteroid Dodge</h1>
            <p>Use Arrow Keys or WASD to navigate. You have zero gravity inertia.<br>Avoid the incoming asteroids!</p>
            <button id="startBtn" class="btn btn-primary pulse">Start Engine</button>
        </div>

        <div id="gameOverScreen" class="overlay-screen hidden">
            <h1>Ship Destroyed!</h1>
            <p>Final Score: <span id="finalScoreVal">0</span></p>
            <button id="restartBtn" class="btn btn-primary">Play Again</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    
    <script src="script.js"></script>
</body>
</html>
