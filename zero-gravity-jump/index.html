<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero Gravity Jump - Antigravity</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ui-container">
        <div class="top-bar">
            <a href="../../index.html" class="btn-back">← Back to Hub</a>
            <div class="score-display">Height: <span id="scoreVal">0</span>m</div>
        </div>

        <div id="startScreen" class="overlay-screen">
            <h1>Zero Gravity Jump</h1>
            <p>Use Left/Right Arrows or A/D to move. <br>Leap across floating platforms in deep space. It's slippery and floaty!</p>
            <button id="startBtn" class="btn btn-primary pulse">Initiate Launch</button>
        </div>

        <div id="gameOverScreen" class="overlay-screen hidden">
            <h1>Lost in Space...</h1>
            <p>Max Height: <span id="finalScoreVal">0</span>m</p>
            <button id="restartBtn" class="btn btn-primary">Jump Again</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    
    <script src="script.js"></script>
</body>
</html>
